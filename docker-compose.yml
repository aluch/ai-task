x-php-service: &php-service
  build:
    context: ./docker/php
    dockerfile: Dockerfile
  working_dir: /var/www/app
  volumes:
    - ./app:/var/www/app:cached
  env_file:
    - .env
  environment:
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ANTHROPIC_MODEL_PARSER: ${ANTHROPIC_MODEL_PARSER}
    ANTHROPIC_MODEL_ADVISOR: ${ANTHROPIC_MODEL_ADVISOR}
    ANTHROPIC_MODEL_ASSISTANT: ${ANTHROPIC_MODEL_ASSISTANT}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS}
    TELEGRAM_MODE: ${TELEGRAM_MODE:-polling}
    TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL}
    APP_ENV: ${APP_ENV}
    APP_SECRET: ${APP_SECRET}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  networks:
    - ai-task

services:
  php:
    <<: *php-service
    container_name: ai-task-php
    # Отдельный cache volume — см. комментарий у bot'а ниже.
    volumes:
      - ./app:/var/www/app:cached
      - php_cache:/var/www/app/var/cache

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-task-nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./app:/var/www/app:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - ai-task

  postgres:
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: ai-task-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ai-task

  redis:
    image: redis:7-alpine
    container_name: ai-task-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-task

  bot:
    <<: *php-service
    container_name: ai-task-bot
    # APP_ENV=dev + APP_DEBUG=0: те же соображения что у scheduler.
    # Nutgram polling loop тоже long-running процесс, TraceableEventDispatcher
    # на нём пока не ловился, но профилактика лишней не будет.
    # cache:clear на старте — свежий DI после изменения кода/сервисов.
    #
    # Изолированный cache volume (bot_cache): bind mount ./app монтирует
    # var/cache вместе со всем кодом, а bot/scheduler/php все пересобирают
    # dev-кэш параллельно при старте. Если var/cache общий, получается
    # race condition: контейнер DI ссылается на файл сервиса, который
    # другой контейнер только что удалил → ошибка «Failed opening required
    # .../getDoctrine_Dbal_DefaultConnectionService.php». Отдельный
    # named volume на var/cache отрезает эту папку от bind mount —
    # каждый контейнер пересобирает свой кэш независимо.
    environment:
      APP_ENV: dev
      APP_DEBUG: 0
    volumes:
      - ./app:/var/www/app:cached
      - bot_cache:/var/www/app/var/cache
    command: sh -c 'php bin/console cache:clear --env=dev --no-warmup 2>/dev/null; php bin/console app:bot:run -vv'
    restart: always
    stop_grace_period: 35s

  scheduler:
    <<: *php-service
    container_name: ai-task-scheduler
    # APP_ENV=dev + APP_DEBUG=0:
    # - dev: при кэш-промахе компилируется актуальный DI-container
    #   (при APP_DEBUG=1 было бы ещё и автоматически на mtime-изменениях,
    #   но debug=1 включает TraceableEventDispatcher, у которого в
    #   Symfony 7.4 баг с WorkerRunningEvent ломает messenger worker loop).
    # - debug=0: TraceableEventDispatcher не подключается. Чтобы
    #   компенсировать отсутствие автоинвалидации, на старте делаем
    #   cache:clear --no-warmup — каждый restart даёт свежий DI.
    #
    # --time-limit=3600 + restart: always: воркер сам завершается через
    # час (защита от memory leak). `on-failure` НЕ рестартит graceful
    # exit (code 0) — из-за чего scheduler тихо умирал после первого часа.
    # `always` гарантирует поднятие в любом случае.
    environment:
      APP_ENV: dev
      APP_DEBUG: 0
    volumes:
      - ./app:/var/www/app:cached
      - scheduler_cache:/var/www/app/var/cache
    command: sh -c 'php bin/console cache:clear --env=dev --no-warmup 2>/dev/null; php bin/console messenger:consume scheduler_reminders --time-limit=3600'
    restart: always

  adminer:
    image: adminer:latest
    container_name: ai-task-adminer
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    command: ["php", "-S", "0.0.0.0:8080", "-t", "/var/www/html"]
    depends_on:
      - postgres
    networks:
      - ai-task

volumes:
  postgres-data:
  redis-data:
  # Изолированный Symfony cache на контейнер — см. bot.volumes.
  bot_cache:
  scheduler_cache:
  php_cache:

networks:
  ai-task:
    driver: bridge
