services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ai-task-php
    working_dir: /var/www/app
    volumes:
      - ./app:/var/www/app:cached
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ai-task

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-task-nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./app:/var/www/app:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - ai-task

  postgres:
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: ai-task-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ai-task

  redis:
    image: redis:7-alpine
    container_name: ai-task-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-task

  bot:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: ai-task-bot
    working_dir: /var/www/app
    command: php bin/console app:bot:run -vv
    volumes:
      - ./app:/var/www/app:cached
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure
    stop_grace_period: 35s
    networks:
      - ai-task

  adminer:
    image: adminer:latest
    container_name: ai-task-adminer
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    command: ["php", "-S", "0.0.0.0:8080", "-t", "/var/www/html"]
    depends_on:
      - postgres
    networks:
      - ai-task

volumes:
  postgres-data:
  redis-data:

networks:
  ai-task:
    driver: bridge
