# Общая конфигурация ротации логов для всех контейнеров. Без неё
# json-file-driver Docker'а накапливает логи без ограничения и за
# несколько недель забивает диск (особенно messenger.INFO от scheduler'а
# каждую минуту). 3 × 50MB сжатых = ~150MB на контейнер — с запасом.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"
    compress: "true"

x-php-service: &php-service
  build:
    context: .
    dockerfile: docker/php/Dockerfile.prod
  working_dir: /var/www/app
  env_file:
    - .env
  logging: *default-logging
  environment:
    APP_ENV: prod
    APP_DEBUG: 0
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ANTHROPIC_MODEL_PARSER: ${ANTHROPIC_MODEL_PARSER}
    ANTHROPIC_MODEL_ADVISOR: ${ANTHROPIC_MODEL_ADVISOR}
    ANTHROPIC_MODEL_ASSISTANT: ${ANTHROPIC_MODEL_ASSISTANT}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS}
    # Без `:-` — compose даст warning если переменная отсутствует в .env.
    # Раньше с `${ADMIN_TELEGRAM_ID:-}` было тихое подставление пустой
    # строки, и /admin * команды молча не работали в проде.
    ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
    TELEGRAM_MODE: ${TELEGRAM_MODE:-webhook}
    TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
    DATABASE_URL: ${DATABASE_URL}
    REDIS_URL: ${REDIS_URL}
    APP_SECRET: ${APP_SECRET}
    DOMAIN: ${DOMAIN}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  networks:
    - ai-task

services:
  php:
    <<: *php-service
    container_name: ai-task-php-prod
    restart: always
    # opcache + warmed cache в образе — пересобирать не надо.

  caddy:
    image: caddy:2-alpine
    container_name: ai-task-caddy
    restart: always
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Bind mount public/ из репозитория. Раньше тут был named volume
      # php_app_public с идеей «Docker инициализирует из php-image» — но
      # named volume берёт содержимое из ПЕРВОГО контейнера, который его
      # маунтит. Caddy в depends_on шёл после php, но startup race — и
      # бывало volume получал пустоту от Caddy, после чего повторная
      # инициализация уже не делалась. Bind mount с хоста — детерминирован
      # и точно совпадает с тем что в php-контейнере (он копирует public/
      # из ./app/public при build composer-stage).
      - ./app/public:/var/www/app/public:ro
      # Лендинг pomni.io — статика из отдельного репо pomni-landing,
      # клонированного на VPS в /home/deploy/pomni-landing. У лендинга
      # свой CI/CD (git pull), Caddy раздаёт файлы прямо с диска без
      # рестарта. Путь абсолютный: docker-compose.prod.yml на локальной
      # машине не запускается, поэтому prod-only путь безопасен.
      - /home/deploy/pomni-landing:/var/www/landing:ro
    depends_on:
      - php
    networks:
      - ai-task
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:${POSTGRES_VERSION}-alpine
    container_name: ai-task-postgres-prod
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ai-task
    ports:
      # Биндим только на 127.0.0.1 хост-машины — наружу через интернет
      # порт всё ещё закрыт (firewall + явный bind на loopback). Доступ
      # из локальных GUI (HeidiSQL/DBeaver/psql) — через SSH-туннель:
      #   ssh -L 5432:127.0.0.1:5432 deploy@${VPS_HOST}
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ai-task-redis-prod
    restart: always
    logging: *default-logging
    volumes:
      - redis_data_prod:/data
    networks:
      - ai-task

  scheduler:
    <<: *php-service
    container_name: ai-task-scheduler-prod
    # Prod-окружение, без cache:clear на старте — кэш уже warmed в образе.
    command: php bin/console messenger:consume scheduler_reminders --time-limit=3600
    restart: always

# Bot polling-сервис в prod НЕ запускается — webhook режим (TELEGRAM_MODE=webhook).
# BotRunCommand при TELEGRAM_MODE=webhook сразу выходит с code 0, поэтому даже
# если контейнер случайно запустят — он не заюзает API через polling.

volumes:
  postgres_data_prod:
  redis_data_prod:
  caddy_data:
  caddy_config:

networks:
  ai-task:
    driver: bridge
