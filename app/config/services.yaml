# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    telegram.bot_token: '%env(TELEGRAM_BOT_TOKEN)%'
    telegram.allowed_user_ids: '%env(TELEGRAM_ALLOWED_USER_IDS)%'
    anthropic.api_key: '%env(ANTHROPIC_API_KEY)%'
    anthropic.model_parser: '%env(ANTHROPIC_MODEL_PARSER)%'
    anthropic.model_advisor: '%env(ANTHROPIC_MODEL_ADVISOR)%'
    anthropic.model_assistant: '%env(ANTHROPIC_MODEL_ASSISTANT)%'
    redis.url: '%env(REDIS_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Telegram middleware/handlers
    App\Telegram\Middleware\WhitelistMiddleware:
        arguments:
            $allowedUserIds: '%telegram.allowed_user_ids%'

    App\Command\BotRunCommand:
        arguments:
            $telegramToken: '%telegram.bot_token%'

    # Claude API
    App\AI\ClaudeClient:
        arguments:
            $apiKey: '%anthropic.api_key%'

    App\AI\TaskParser:
        arguments:
            $model: '%anthropic.model_parser%'

    App\AI\TaskAdvisor:
        arguments:
            $model: '%anthropic.model_advisor%'

    App\AI\Assistant:
        arguments:
            $model: '%anthropic.model_assistant%'

    # Использует ту же Haiku что TaskParser — семантический матчер задач
    # (дешёвый, задача классификации не требует Sonnet).
    App\AI\TaskMatcher:
        arguments:
            $model: '%anthropic.model_parser%'

    # Autoconfigure тегом все AssistantTool-реализации,
    # ToolRegistry собирает их через tagged_iterator.
    _instanceof:
        App\AI\Tool\AssistantTool:
            tags: ['app.assistant_tool']

    App\AI\Tool\ToolRegistry:
        arguments:
            $tools: !tagged_iterator app.assistant_tool

    App\Service\FreeSuggestionStore:
        arguments:
            $redisUrl: '%redis.url%'

    App\Service\DependencyStateStore:
        arguments:
            $redisUrl: '%redis.url%'

    App\Service\PaginationStore:
        arguments:
            $redisUrl: '%redis.url%'

    App\Notification\TelegramNotifier:
        arguments:
            $token: '%telegram.bot_token%'

    # Прод-реализация TelegramNotifierInterface — HTTP-клиент к Bot API.
    # Smoke-команды в runtime переключают его в in-memory режим через
    # `useInMemory()` на том же singleton-инстансе.
    App\Notification\TelegramNotifierInterface:
        alias: App\Notification\TelegramNotifier

    # Clock: прод = SystemClock. Smoke-команды через SmokeHarness::freezeTimeAt
    # подменяют свойство на FrozenClock в сервисах reminder pipeline
    # (reflection). Никаких container->set() — Symfony 7 запрещает
    # подменять уже-инициализированные сервисы.
    App\Clock\Clock:
        alias: App\Clock\SystemClock
