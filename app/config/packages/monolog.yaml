monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            # Раньше main был fingers_crossed с action_level=error: info/warning
            # буферились в памяти и сбрасывались в stderr ТОЛЬКО при error.
            # Для bot'а это плохо — у нас нет HTTP error-codes, и большая часть
            # ценных логов (Assistant, middleware, scheduler) идёт уровнем info.
            # В итоге docker compose logs php в проде был пустой.
            #
            # Теперь — прямой stream в stderr с level=info. docker logs покажет
            # всё что пишет Monolog. Размер логов — приемлемый, у нас не
            # высоконагруженный web-сервис, а personal-tier бот.
            main:
                type: stream
                path: php://stderr
                level: info
                formatter: monolog.formatter.json
                channels: ["!deprecation", "!event", "!doctrine"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
