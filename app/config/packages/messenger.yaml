framework:
    messenger:
        transports:
            sync: 'sync://'

        # Scheduler-транспорт `scheduler_reminders` для #[AsSchedule('reminders')]
        # создаётся автоматически Symfony Scheduler'ом (in-process). Руками его
        # регистрировать не нужно — достаточно consumer `messenger:consume
        # scheduler_reminders`. Роутинг тоже не требуется: Scheduler сам
        # отправляет CheckDeadlineRemindersMessage в свой транспорт.
        routing: {}
